<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- PCB background -->
  <rect width="32" height="32" rx="6" fill="#161B22"/>
  <!-- IC chip body -->
  <rect x="9" y="9" width="14" height="14" rx="2" fill="#58A6FF" opacity="0.15"/>
  <rect x="9" y="9" width="14" height="14" rx="2" stroke="#58A6FF" stroke-width="1.5"/>
  <!-- Chip pins left -->
  <line x1="5" y1="12" x2="9" y2="12" stroke="#58A6FF" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="5" y1="16" x2="9" y2="16" stroke="#58A6FF" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="5" y1="20" x2="9" y2="20" stroke="#58A6FF" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Chip pins right -->
  <line x1="23" y1="12" x2="27" y2="12" stroke="#58A6FF" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="23" y1="16" x2="27" y2="16" stroke="#58A6FF" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="23" y1="20" x2="27" y2="20" stroke="#58A6FF" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="2" fill="#3FB950"/>
</svg>
